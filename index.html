<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/supamoto-logo.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SupaTicket · SupaMoto</title>

    <!-- Poppins — secondary brand typeface (Galano Classic equivalent, free).
         Preconnect saves a round-trip; the weights cover regular text
         through display headings. -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&display=swap"
      rel="stylesheet"
    />

    <!-- Apply the persisted (or system) theme synchronously before paint to
         prevent a flash-of-light-content on first load in dark mode. Kept in
         sync with src/shared/components/ThemeToggle.jsx. -->
    <script>
      (function () {
        try {
          var pref = localStorage.getItem('theme');
          var dark = pref === 'dark' ||
            (!pref && window.matchMedia('(prefers-color-scheme: dark)').matches);
          if (dark) document.documentElement.classList.add('dark');
        } catch (e) { /* ignore */ }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
